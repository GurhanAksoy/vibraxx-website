<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7c3aed" />
  <title>VibraXX – You're Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.2;
    }
    .orb-1 { width: 380px; height: 380px; background: #7c3aed; top: -120px; left: -120px; }
    .orb-2 { width: 300px; height: 300px; background: #d946ef; bottom: -80px; right: -80px; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 0.55; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      background: linear-gradient(135deg, rgba(30,27,75,0.97), rgba(15,23,42,0.97));
      border: 2px solid rgba(139,92,246,0.45);
      border-radius: clamp(20px,5vw,28px);
      padding: clamp(32px,7vw,52px) clamp(24px,6vw,48px);
      max-width: 400px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 0 40px rgba(124,58,237,0.15);
      animation: fade-up 0.45s ease-out both;
    }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      width: clamp(88px,20vw,110px);
      height: clamp(88px,20vw,110px);
      margin: 0 auto clamp(24px,5vw,32px);
      animation: float 3s ease-in-out infinite;
      will-change: transform;
    }
    .logo-wrap::before {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      background: rgba(139,92,246,0.35);
      animation: pulse-ring 2.2s ease-out infinite;
      will-change: transform, opacity;
    }
    .logo-ring {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
      border-radius: 50%;
      padding: 5px;
      background: radial-gradient(circle at 0 0, #7c3aed, #d946ef);
      box-shadow: 0 0 36px rgba(124,58,237,0.6), 0 0 70px rgba(217,70,239,0.3);
    }
    .logo-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #020817;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .logo-inner img {
      width: 65%; height: 65%;
      object-fit: contain;
    }

    /* ── Text ── */
    .brand {
      font-size: clamp(11px,2.5vw,13px);
      font-weight: 700;
      color: #7c3aed;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(24px,6vw,32px);
      font-weight: 900;
      background: linear-gradient(90deg, #a78bfa, #f0abfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      line-height: 1.15;
    }

    p {
      font-size: clamp(14px,3.5vw,16px);
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: clamp(24px,5vw,32px);
    }

    /* ── Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: clamp(13px,3.5vw,16px) 24px;
      background: linear-gradient(135deg, #7c3aed, #d946ef);
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 800;
      font-size: clamp(14px,3.5vw,16px);
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 28px rgba(124,58,237,0.45);
      margin-bottom: clamp(20px,4vw,28px);
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(124,58,237,0.65); }
    .btn:active { transform: translateY(0); }

    /* ── Status badge ── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: rgba(139,92,246,0.12);
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      transition: all 0.4s;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      animation: blink 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    .status.online {
      background: rgba(34,197,94,0.12);
      border-color: rgba(34,197,94,0.4);
      color: #86efac;
    }
    .status.online .dot {
      background: #22c55e;
      animation: none;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <div class="logo-wrap">
      <div class="logo-ring">
        <div class="logo-inner">
          <img src="/icons/manifest-icon-192.maskable.png" alt="VibraXX"
               onerror="this.style.display='none'; this.parentElement.querySelector('.fallback').style.display='flex';" />
          <span class="fallback" style="display:none; font-size: 40px; align-items:center; justify-content:center; width:100%; height:100%;">⚡</span>
        </div>
      </div>
    </div>

    <div class="brand">VibraXX</div>
    <h1>You're Offline</h1>
    <p>Check your connection and tap below to reconnect. Your rounds are waiting.</p>

    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      Try Again
    </button>

    <div class="status" id="status">
      <span class="dot" id="dot"></span>
      <span id="status-text">Offline</span>
    </div>
  </div>

  <script>
    const statusEl   = document.getElementById('status');
    const statusText = document.getElementById('status-text');

    function setOnline() {
      statusEl.classList.add('online');
      statusText.textContent = 'Connected — redirecting...';
      setTimeout(() => { window.location.href = '/'; }, 700);
    }

    window.addEventListener('online', setOnline);

    // Periyodik kontrol
    const check = setInterval(() => {
      if (navigator.onLine) { clearInterval(check); setOnline(); }
    }, 2000);
  </script>
</body>
</html>
